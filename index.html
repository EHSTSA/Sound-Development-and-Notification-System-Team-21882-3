<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Audio Detector</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Auth screen ── -->
  <div id="authScreen">
    <div class="auth-card">
      <div class="auth-logo">🎧</div>
      <h2 class="auth-title">Audio Detector</h2>
      <p class="auth-sub">Sign in to continue</p>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignIn">Sign In</button>
        <button class="auth-tab"        id="tabSignUp">Create Account</button>
      </div>

      <div class="auth-fields">
        <input class="auth-input" type="email"    id="emailInput"       placeholder="Email address"   autocomplete="email" />
        <input class="auth-input" type="password" id="passInput"        placeholder="Password"        autocomplete="current-password" />
        <input class="auth-input" type="password" id="passConfirmInput" placeholder="Confirm password" autocomplete="new-password" style="display:none" />
      </div>

      <div id="authError" class="auth-error"></div>

      <button class="btn btn-primary auth-btn" id="signInBtn">Sign In</button>
      <button class="btn btn-primary auth-btn" id="signUpBtn" style="display:none">Create Account</button>

      <div class="auth-divider"><span>or</span></div>

      <button class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>

  <!-- ── Main app ── -->
  <div id="mainApp" style="display:none">
    <div class="shell">

      <div class="header">
        <h1>Audio Detector</h1>
        <label class="toggle-wrap">
          Dark
          <label class="toggle">
            <input type="checkbox" id="darkSetting">
            <span class="toggle-slider"></span>
          </label>
        </label>
      </div>

      <div class="user-bar">
        <span class="user-bar-email" id="userEmail"></span>
        <button class="btn-sign-out" id="signOutBtn">Sign out</button>
      </div>

      <div class="status-card">
        <div class="status-orb" id="statusOrb">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted)">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <div class="status-info">
          <div class="status-label">Status</div>
          <div class="status-value" id="status">Idle</div>
        </div>
      </div>

      <div id="alertBox"></div>

      <div class="controls">
        <button class="btn btn-primary full" id="startBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          Start Listening
        </button>
        <button class="btn btn-secondary" id="stopBtn" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Stop
        </button>
        <button class="btn btn-secondary" id="settingsBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </button>
      </div>

      <div id="settingsPanel">
        <div class="settings-title">General</div>

        <div class="setting-row">
          <div>
            <div class="setting-label">Notifications</div>
            <div class="setting-desc">Alert when tab is in background</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="notifSetting">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="setting-row">
          <div>
            <div class="setting-label">Confidence threshold</div>
            <div class="setting-desc">Minimum score to trigger an alert</div>
          </div>
          <div class="slider-wrap">
            <input type="range" id="thresholdSlider" min="0.05" max="0.95" step="0.01" value="0.20">
            <span class="slider-val" id="thresholdVal">0.20</span>
          </div>
        </div>

        <div class="settings-title mt">Monitored Sounds</div>
        <div id="soundToggles"></div>
      </div>

      <div class="log-card">
        <div class="log-header">
          <span class="log-title">Event Log</span>
          <button class="log-clear" id="clearLog">Clear</button>
        </div>
        <div id="eventLog"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.14.0/dist/tf.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
